name: Build & push Salad worker image

# ── Supported models ──────────────────────────────────────────────────────────
#
#  image_tag    │ model_id                                        │ weights │ runner
#  ─────────────┼─────────────────────────────────────────────────┼─────────┼──────────────
#  12b-vl-bf16  │ nvidia/NVIDIA-Nemotron-Nano-12B-v2-VL-BF16      │ ~24 GB  │ ubuntu-latest (after disk cleanup)
#  30b-a3b-bf16 │ nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16      │ ~60 GB  │ self-hosted   (needs >= 120 GB free disk)
#
# The 30B model is excluded from the auto-triggered build. To build it, trigger
# workflow_dispatch and select "30b-a3b-bf16".
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.salad"
      - "vllm.sh"
      - "patch_vllm.py"
      - ".github/workflows/build-salad.yml"
  workflow_dispatch:
    inputs:
      model:
        description: "Model variant to build"
        required: false
        default: 12b-vl-bf16
        type: choice
        options:
          - 12b-vl-bf16
          - 30b-a3b-bf16

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: easedai/nemotron-salad

# ── 1. Generate matrix ─────────────────────────────────────────────────────────

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - name: Resolve build matrix
        id: matrix
        env:
          SELECTED: ${{ github.event.inputs.model || '12b-vl-bf16' }}
        run: |
          ALL=$(cat <<'EOF'
          {
            "include": [
              {
                "image_tag": "12b-vl-bf16",
                "model_id":  "nvidia/NVIDIA-Nemotron-Nano-12B-v2-VL-BF16",
                "latest":    "true",
                "runner":    "ubuntu-latest"
              },
              {
                "image_tag": "30b-a3b-bf16",
                "model_id":  "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16",
                "latest":    "false",
                "runner":    "self-hosted"
              }
            ]
          }
          EOF
          )

          echo "Building model: $SELECTED"
          FILTERED=$(echo "$ALL" | jq -c --arg tag "$SELECTED" \
            '{include: [.include[] | select(.image_tag == $tag)]}')
          echo "value=$FILTERED" >> "$GITHUB_OUTPUT"

# ── 2. Build each model ────────────────────────────────────────────────────────

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ubuntu-latest has ~14 GB free; removing unused toolchains gives ~54 GB.
      # Sufficient for the 12B image (~40 GB total).
      # The 30B model (~75 GB image) requires a self-hosted runner with >= 120 GB.
      - name: Free up disk space (ubuntu-latest only)
        if: matrix.runner == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache:     true
          android:        true
          dotnet:         true
          haskell:        true
          large-packages: true
          docker-images:  true
          swap-storage:   true

      - name: Show available disk
        run: df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Each model gets a stable tag plus an immutable SHA tag.
      # :latest tracks the default model (12b-vl-bf16).
      - name: Generate image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA="${GITHUB_SHA::7}"
          TAG="${{ matrix.image_tag }}"
          TAGS="${BASE}:${TAG},${BASE}:${TAG}-sha-${SHA}"
          if [ "${{ matrix.latest }}" = "true" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${BASE}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Built tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push — ${{ matrix.image_tag }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.salad
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            MODEL_ID=${{ matrix.model_id }}
          secrets: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          # Registry cache has no 10 GB GHA limit — the ~24 GB model layer
          # actually persists between runs. Scoped per model tag.
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.image_tag }}
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.image_tag }},mode=max

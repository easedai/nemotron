name: Build & push worker image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "entrypoint.sh"
      - "patch_vllm.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ubuntu-latest has ~14 GB free; removing unused toolchains gives ~54 GB.
      # Sufficient for the 12B image (~40 GB total).
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache:     true
          android:        true
          dotnet:         true
          haskell:        true
          large-packages: true
          docker-images:  true
          swap-storage:   true

      - name: Show available disk
        run: df -h /

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SHA="${GITHUB_SHA::7}"
          TAGS="${BASE}:12b-vl-bf16,${BASE}:12b-vl-bf16-sha-${SHA}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${BASE}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Built tags: $TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            MODEL_ID=nvidia/NVIDIA-Nemotron-Nano-12B-v2-VL-BF16
          secrets: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-12b-vl-bf16
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-12b-vl-bf16,mode=max
